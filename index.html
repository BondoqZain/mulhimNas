<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=Montserrat+Alternates:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MulhimNas</title>
  </head>
  <body>
    <div class="container">
      <nav>
        <section class="nav-list">
          <img src="assets/Logo.png" alt="logo" />
          <ul>
            <li><a href="#">الرئيسية</a></li>
            <li><a href="#">الاقسام والمجالات</a></li>
            <li><a href="#">المؤثرين</a></li>
            <li><a href="#">المكتبة</a></li>
            <li><a href="#">عن المنصة</a></li>
          </ul>
        </section>
        <section class="login">
          <div class="basket">
            <i class="fa-solid fa-cart-shopping"></i>
          </div>
          <div>
            <button class="login-btn">تسجيل دخول</button>
          </div>
        </section>
      </nav>
    </div>
    <main>
      <div class="container">
        <section class="hero">
          <section class="intro">
            <h1>
              Learn from <br />
              the best,<br />
              be your<br />
              best
            </h1>
            <article class="intro-artical">
              Forbes 30 Under 30, helping brands scale to 7-figure <br />
              revenues through data-driven marketing strategies.
            </article>
            <button class="explore">Explore</button>
          </section>
          <section class="images">
            <div class="col1">
              <img
                src="assets/Carousel_Kim_Kardashian.jpg.png"
                alt="kim kardashian"
              />

              <img
                src="assets/Carousel_Joanna_Gaines_4.jpg.png"
                alt="joanna gaines"
              />
            </div>
            <div class="col2">
              <img
                src="assets/Carousel_Jeffrey_Pfeffer_CM_NY.jpg.png"
                alt="jeffrey pfeffer"
              />
              <img
                src="assets/Carousel_Ryan_Holiday.jpg.png"
                alt="ryan holiday"
              />
              <img
                src="assets/Carousel_Ramit_Sethi.jpg.png"
                alt="ramit sethi"
              />
            </div>
          </section>
        </section>

        <section>
          <h1>Featured Classes</h1>
          <p>Learn from the world's best</p>
        </section>
      </div>
    </main>

  <script
    src="https://kit.fontawesome.com/f309e1fa18.js"

  ></script>
